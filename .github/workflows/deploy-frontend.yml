name: Deploy Frontend

# Se activa cuando hay un push a main con cambios en el frontend
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  IMAGE_NAME: gastos-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Autenticarse en Azure con el Service Principal
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Autenticarse en el Container Registry de Azure
      - name: Login en ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # 4. Construir la imagen Docker del frontend
      #    VITE_API_URL se pasa como build argument para que Vite lo hornee
      #    en el bundle estático durante el build. Sin este valor, el frontend
      #    no sabría a qué URL llamar para la API del backend.
      - name: Build y push imagen Docker
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # 5. Conectarse a la VM por SSH, descargar la nueva imagen y reiniciar el contenedor
      - name: Deploy a VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_NAME }} -p ${{ secrets.ACR_PASSWORD }}
            cd /home/azureuser/app
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d frontend
