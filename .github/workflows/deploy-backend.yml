name: Deploy Backend

# Se activa cuando hay un push a main con cambios en el backend
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  IMAGE_NAME: gastos-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Autenticarse en Azure con el Service Principal
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Autenticarse en el Container Registry de Azure
      - name: Login en ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # 4. Construir la imagen Docker del backend y subirla al ACR
      #    Se etiqueta con el SHA del commit para tener historial de versiones
      - name: Build y push imagen Docker
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # 5. Actualizar el Container App para que use la nueva imagen
      - name: Deploy a Azure Container Apps
        run: |
          az containerapp update \
            --name "gastos-backend" \
            --resource-group "rg-gastos-prod" \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
