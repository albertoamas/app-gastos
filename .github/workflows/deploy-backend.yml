name: Deploy Backend

# Se activa cuando hay un push a main con cambios en el backend
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  IMAGE_NAME: gastos-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Autenticarse en Azure con el Service Principal
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Autenticarse en el Container Registry de Azure
      - name: Login en ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # 4. Construir la imagen Docker del backend y subirla al ACR
      #    Se etiqueta con el SHA del commit para tener historial de versiones
      - name: Build y push imagen Docker
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # 5. Conectarse a la VM por SSH, descargar la nueva imagen y reiniciar el contenedor
      - name: Deploy a VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_NAME }} -p ${{ secrets.ACR_PASSWORD }}
            cd /home/azureuser/app
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d backend
